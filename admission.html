<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Poppins font -->
  <link rel="icon" type="image/png" href="img/fevicon.png">
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #6045ea;
      --secondary: #854fee;
      --accent: #ee46a6;
      --light: #f2f2f2;
      --dark: #22223b;
      --neutral: #d9d4e7;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--light);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px 40px 30px;
    }

    /* Header */
    header {
      background: var(--primary);
      color: #fff;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(60, 30, 100, 0.03);
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 0;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-img {
      height: 38px;
      width: auto;
      filter: brightness(0) invert(1);
      margin-right: 10px;
      display: block;
      object-fit: contain;
      background: none;
      border-radius: 0;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 22px;
      position: relative;
      user-select: none;
    }

    .nav-menu a,
    .dropdown-btn {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      transition: background 0.2s;
      border-radius: 6px;
      outline: none;
    }

    .nav-menu a:hover,
    .dropdown-btn:hover {
      background: var(--accent);
    }

    .dropdown {
      position: relative;
      display: inline-block;
      z-index: 100;
    }

    .dropdown-btn {
      padding-right: 18px;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 130%;
      left: 0;
      background: #fff;
      min-width: 180px;
      box-shadow: 0 8px 16px rgba(96, 69, 234, 0.15);
      z-index: 99;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      animation: dropdown-in 0.25s;
      transition: opacity 0.3s ease;
    }

    @keyframes dropdown-in {
      from {
        transform: translateY(-15px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .dropdown-content a {
      color: var(--primary);
      background: #fff;
      padding: 13px 20px;
      text-decoration: none;
      display: block;
      font-weight: 500;
      border-bottom: 1px solid var(--neutral);
      transition: background 0.18s;
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    .dropdown-content a:hover {
      background: var(--neutral);
      color: var(--accent);
    }

    .dropdown.open .dropdown-content {
      display: block;
    }

    /* Search box */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn-register {
      display: inline-block;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.07rem;
      letter-spacing: 0.02em;
      padding: 8px 26px;
      border-radius: 30px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      outline: none;
      color: #fff;
      background: linear-gradient(100deg, var(--accent), var(--secondary));
      box-shadow: 0 4px 24px var(--accent)13;
      transition: background 0.20s, color 0.18s, box-shadow 0.18s, transform 0.13s;
    }

    .btn-register:hover {
      background: linear-gradient(100deg, var(--secondary), var(--accent));
      color: #fff;
      transform: scale(1.05) translateY(-2px);
    }

    /* Hero section (simple for admission page) */
    .hero-section {
      background: linear-gradient(100deg, var(--secondary) 50%, var(--accent) 100%);
      padding: 60px 0 40px 0;
      text-align: center;
      color: white;
    }

    .hero-section h1 {
      font-size: 3rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
    }

    /* Form styling */
    .admission-form {
      background: #fff;
      padding: 38px 30px 48px 30px;
      border-radius: 14px;
      box-shadow: 0 2px 24px 0 #6045ea30;
      margin-top: 38px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .admission-form h2 {
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 28px;
      font-size: 2.1rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--dark);
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      border: 1.5px solid var(--neutral);
      border-radius: 8px;
      padding: 12px 15px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      resize: vertical;
    }

    textarea {
      min-height: 120px;
    }

    select {
      cursor: pointer;
    }

    button.submit-btn {
      display: block;
      width: 100%;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px 0;
      border: none;
      border-radius: 35px;
      margin-top: 28px;
      cursor: pointer;
      transition: background 0.25s;
    }

    button.submit-btn:hover {
      background: var(--accent);
    }

    footer {
      background: var(--primary);
      color: #fff;
      padding: 20px 15px 40px 15px;
      text-align: center;
      margin-top: 60px;
      border-radius: 20px 20px 0 0;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    footer strong {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    footer p {
      margin: 0 0 12px 0;
    }

    footer>div {
      max-width: 1100px;
      margin: 0 auto;
    }

    footer>div>div {
      color: #d5cfff;
      font-style: italic;
      margin-bottom: 15px;
    }

    footer .social-media {
      font-size: 1.6rem;
      display: flex;
      justify-content: center;
      gap: 32px;
      color: #dcd4ffcc;
    }

    footer .social-media a {
      color: inherit;
      text-decoration: none;
      transition: color 0.3s;
    }

    footer .social-media a:hover {
      color: var(--accent);
    }

    @media (max-width: 700px) {
      .admission-form {
        padding: 30px 20px;
        max-width: 100%;
      }

      .nav-menu,
      .nav-right {
        gap: 10px;
      }
    }
  </style>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
  <header>
    <div class="container navbar">
      <div class="nav-left">
        <img src="img/logo.png" alt="Lakshya Logo" class="logo-img" />
        <nav class="nav-menu" id="navMenu">
          <a href="index.html">Home</a>
          <div class="dropdown" id="courseDropdown">
            <button class="dropdown-btn" id="dropdownBtn">Course ▼</button>
            <div class="dropdown-content" id="dropdownContent">
              <a href="Course.html">Basic Course</a>
              <a href="Course.html">Intermediate Course</a>
              <a href="Course.html">Advance Course</a>
            </div>
          </div>
          <a href="admission.html">Admission</a>
          <a href="Notebook.html">Notebook</a>
          <a href="contact.html">Contact us</a>
        </nav>
      </div>
      <div class="nav-right">
        <a href="register.html" class="btn-register">Register</a>

      </div>
    </div>
  </header>

  <section class="hero-section">
    <h1>Admission Form</h1>
  </section>

  <main>
    <section class="container">
      <form class="admission-form" id="admissionForm" novalidate>
        <h2>Apply for Admission</h2>
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input id="fullName" name="fullName" type="text" required placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label for="fatherName">Father's Name *</label>
          <input id="fatherName" name="fatherName" type="text" required placeholder="Enter father's name" />
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth *</label>
          <input id="dob" name="dob" type="date" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender *</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input id="email" name="email" type="email" required placeholder="example@mail.com" />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input id="phone" name="phone" type="text" required placeholder="Enter phone number" pattern="^[0-9]{10}$"
            title="Enter 10 digit phone number" />
        </div>
        <div class="form-group">
          <label for="courseSelect">Select Course *</label>
          <select id="courseSelect" name="courseSelect" required>
            <option value="" disabled selected>Select course</option>
            <option value="ADCA">ADCA</option>
            <option value="ADCA Plus">ADCA Plus</option>
            <option value="DCA">DCA</option>
            <option value="TallyPrime">TallyPrime</option>
            <option value="O-Level">O-Level</option>
            <option value="CCC">CCC</option>
          </select>
        </div>
        <div class="form-group">
          <label for="address">Address *</label>
          <textarea id="address" name="address" required placeholder="Enter your address"></textarea>
        </div>
        <button class="submit-btn" type="submit">Submit Application</button>
      </form>
    </section>
  </main>

  <footer>
    <div>
      <strong>Lakshya Computer Institute</strong>
      <p>Empowering Digital India | © 2025 All Rights Reserved</p>
      <div style="color: #d5cfff; font-style: italic; margin-bottom: 15px;">
        Contact: lcisln01@gmail.com &bull; Near SBI Bank Kurebhar Sultanpur Road
      </div>
      <div class="social-media" aria-label="Social Media Links">
        <a href="https://facebook.com/lakshyacomputer" target="_blank" rel="noopener" aria-label="Facebook">
          <i class="fa fa-facebook"></i>
        </a>
        <a href="https://twitter.com/lakshyainstitute" target="_blank" rel="noopener" aria-label="Twitter">
          <i class="fa fa-twitter"></i>
        </a>
        <a href="https://instagram.com/lakshyacomputer" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="fa fa-instagram"></i>
        </a>
      </div>
    </div>
  </footer>

  <script>
    const dropdown = document.getElementById('courseDropdown');
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownContent = document.getElementById('dropdownContent');

    let dropdownTimeout;
    function openDropdown() {
      clearTimeout(dropdownTimeout);
      dropdown.classList.add('open');
    }
    function closeDropdown() {
      dropdownTimeout = setTimeout(() => {
        dropdown.classList.remove('open');
      }, 250);
    }
    dropdownBtn.addEventListener('mouseenter', openDropdown);
    dropdownBtn.addEventListener('mouseleave', closeDropdown);
    dropdownContent.addEventListener('mouseenter', openDropdown);
    dropdownContent.addEventListener('mouseleave', closeDropdown);

    document.getElementById("searchForm").addEventListener("submit", function (e) {
      e.preventDefault();
      let query = document.getElementById("searchInput").value.trim();
      if (query) {
        alert("Search query: " + query);
      } else {
        alert("Please enter search text");
      }
    });

    document.getElementById("admissionForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const form = this;
      const name = form.fullName.value.trim();
      const fatherName = form.fatherName.value.trim();
      const dob = form.dob.value;
      const gender = form.gender.value;
      const email = form.email.value.trim();
      const phone = form.phone.value.trim();
      const course = form.courseSelect.value;
      const address = form.address.value.trim();

      if (!name || !fatherName || !dob || !gender || !email || !phone || !course || !address) {
        alert("Please fill all the required fields.");
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert("Please enter a valid email address.");
        return;
      }
      const phoneRegex = /^[0-9]{10}$/;
      if (!phoneRegex.test(phone)) {
        alert("Please enter a valid 10-digit phone number.");
        return;
      }

      alert("Thank you, " + name + "! Your admission application has been submitted.");
      form.reset();
    });
  </script>
  <!-- FontAwesome CDN for social icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>

</html>
